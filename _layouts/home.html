---
layout: default
---

<link
  rel="stylesheet"
  href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"
/>

<div class="swiper featured-swiper">
  <div class="swiper-wrapper">

    {% for post in site.tags.featured limit:6 %}
      <div class="swiper-slide">
        <a href="{{ post.url }}" class="featured-post">

          <img
            class="featured-post"
            src="{{ post.image }}"
            alt="{{ post.title }}"
            loading="lazy"
          >

          <div class="overlay">
            <h3>{{ post.title }}</h3>
          </div>
          
      <div class="swiper-button-prev"></div>
      <div class="swiper-button-next"></div>
        </a>
      </div>
    {% endfor %}

  </div>
<div class="swiper-pagination" style="color: #fff;"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function () {

  new Swiper('.featured-swiper', {

    slidesPerView: 1,
    spaceBetween: 16,
    grabCursor: true,

    pagination: {
      el: '.swiper-pagination',
      clickable: true,
    },

    navigation: {
      nextEl: '.swiper-button-next',
      prevEl: '.swiper-button-prev',
    },

    breakpoints: {
      640: {
        slidesPerView: 1
      },
      1024: {
        slidesPerView: 1
      }
    }

  });

});
</script>

<style>

.featured-swiper {
  width: 100%;
  padding-bottom: 2rem;
}

.swiper-slide {
  height: auto;
}

.featured-post {
  display: block;
  position: relative;
  overflow: hidden;
  border-radius: 10px;
}

.featured-post img {
  width: 100%;
  height: 300px;
  object-fit: cover;
  display: block;
}

.overlay {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: flex-end;
  padding: 1rem;
  background: linear-gradient(
    to top,
    rgba(0,0,0,0.65),
    rgba(0,0,0,0.05)
  );
}

.overlay h3 {
  margin: 0;
  color: white;
  font-size: 1.50rem;
}

</style>

<div class="blank-block"></div>
<p style="display: none;"></p>

<h2 style="text-align: center;"></h2>

<div class="blank-block"></div>
